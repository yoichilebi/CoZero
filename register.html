<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | CoZero</title>

  <!-- Google Fonts -->
  <link href=" https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/light-dark-mode.css" />
</head>
<body class="light-mode">

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo">CoZero</h1>
      <button id="theme-toggle" class="theme-toggle">🌙</button>
    </div>
  </header>

  <!-- Register Form -->
  <main class="form-container">
    <div class="form-box">
      <h2>Create Your Account</h2>
      <form action="/register" method="POST">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="John Dela Cruz" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />

        <button type="submit" class="btn-primary">Register</button>
      </form>
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025 CoZero. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="js/theme-toggle.js"></script>
</body>
</html>
